---
layout: default
---
<section class="section" id="post">
  <a href="/blog" class="back-link">← <span data-i18n="backToHome">Back</span></a>
  
  <h1 class="post-title">{{ page.title }}</h1>
  
  <div class="post-meta">
    <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
  </div>
  
  <div class="post-content">
    {{ content }}
  </div>
</section>
