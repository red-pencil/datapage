---
layout: default
title: Blog - RDV
description: Latest news and updates from RDV
---

<section class="section" id="blog">
  <a href="{{ '/' | relative_url }}" class="back-link">← <span data-i18n="backToHome">Back</span></a>
  <h2 class="section-title" data-i18n="blogTitle">Blog</h2>
  <div class="blog-list">
    {% assign posts = site.posts | sort: date | reverse %}
    {% for post in posts %}
    <article class="blog-item">
      <div class="blog-item-meta">
        <span class="blog-date">{{ post.date | date: "%Y-%m-%d" }}</span>
      </div>
      <h3 class="blog-item-title">
        <a href="{{ post.url }}" data-en="{{ post.title }}" data-zh="{{ post.title_zh | default: post.title }}">{{ post.title }}</a>
      </h3>
      <p class="blog-item-excerpt" data-en="{{ post.excerpt }}" data-zh="{{ post.excerpt_zh | default: post.excerpt }}">{{ post.excerpt }}</p>
      <a href="{{ post.url }}" class="blog-read-more" data-i18n="readMore">Read More →</a>
    </article>
    {% endfor %}
  </div>
</section>
